name: Build and Sign APK

on:
  workflow_dispatch: # Allows manual button click

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # Safeguard against runner deprecation issues

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the runner to create a GitHub Release
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Change wrapper permissions
      run: chmod +x gradlew # Fixes the "Permission denied" error

    - name: Extract App Version Name
      id: get_version
      run: |
        # Pulls the exact version name string out of your build.gradle.kts file
        VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | awk -F'"' '{print $2}')
        if [ -z "$VERSION_NAME" ]; then
          # Fallback if your version name uses single quotes or direct assignment
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | awk -F"'" '{print $2}')
        fi
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Sign Android APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0" 

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-Release-APK
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Dynamically uses the extracted version name for the tag and release title
        tag_name: "v${{ steps.get_version.outputs.version }}"
        name: "Release v${{ steps.get_version.outputs.version }}"
        draft: false
        prerelease: false
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
